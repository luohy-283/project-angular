<app-page-title title="Người dùng"></app-page-title>

@if (isLoading) {
  <app-loading></app-loading>
} @else if (errorMessage) {
  <div class="error-state" role="alert">{{ errorMessage }}</div>
} @else if (users.length === 0) {
  <app-empty-state message="Chưa có người dùng nào."></app-empty-state>
} @else {
  <div class="table-wrapper">
    <table class="users-table">
      <thead>
        <tr>
          <th>Họ tên</th>
          <th>Email</th>
          <th>Vai trò</th>
        </tr>
      </thead>
      <tbody>
        @for (user of users; track user.id) {
          <tr>
            <td>{{ user.fullName }}</td>
            <td>{{ user.email }}</td>
            <td>
              <span class="role-badge" [class.admin]="user.role === 'ADMIN'">
                {{ user.role }}
              </span>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
}
