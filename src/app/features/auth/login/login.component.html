<div class="login-page">
  <div class="login-card">
    <app-page-title title="Đăng nhập"></app-page-title>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      @if (authError) {
        <div class="form-error" role="alert">{{ authError }}</div>
      }

      <mat-form-field appearance="outline">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username" />
        @if (loginForm.controls.username.invalid && loginForm.controls.username.touched) {
          <mat-error>Username là bắt buộc.</mat-error>
        }
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" />
        @if (loginForm.controls.password.invalid && loginForm.controls.password.touched) {
          <mat-error>Password là bắt buộc.</mat-error>
        }
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit">Đăng nhập</button>
    </form>
  </div>
</div>
