<app-page-title [title]="'Chỉnh sửa hồ sơ ' + (id || '')"></app-page-title>

@if (loading) {
  <app-loading></app-loading>
} @else if (!initialValue) {
  <app-empty-state message="Không tìm thấy hồ sơ để chỉnh sửa."></app-empty-state>
} @else {
  <app-claim-form [initialValue]="initialValue" (formSubmit)="onSubmit($event)" (formCancel)="onCancel()"></app-claim-form>
}
