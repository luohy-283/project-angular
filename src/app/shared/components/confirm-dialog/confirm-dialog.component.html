<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="cancel()">Hủy</button>
  <button mat-flat-button color="primary" (click)="confirm()">Xác nhận</button>
</mat-dialog-actions>
